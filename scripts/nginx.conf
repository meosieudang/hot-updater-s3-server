################################################################################
# Nginx reverse proxy config for Hot Updater S3 Server
# Place this file at: /etc/nginx/sites-available/hot-updater
# Then: sudo ln -s /etc/nginx/sites-available/hot-updater /etc/nginx/sites-enabled/
################################################################################

server {
    listen 80;
    server_name your-domain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ── SSL (Certbot will fill these in) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── Proxy to Express server ───────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Bundle uploads can be large
        client_max_body_size 200M;
        proxy_read_timeout   300s;
        proxy_connect_timeout 60s;
    }

    # ── Health check endpoint (no auth logging) ───────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
